<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de productos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">

<div class="bg-gradient-to-r from-indigo-600 to-indigo-400 text-white px-8 py-8 rounded-b-2xl mb-8 shadow-md">
    <h1 class="text-2xl font-bold">Catálogo de productos</h1>
    <p class="text-indigo-100 font-light" th:text="${nombreProyecto}"></p>
</div>

<div class="max-w-5xl mx-auto px-4">

    <form method="get" th:action="@{/productos}"
          class="bg-white rounded-xl shadow-sm p-4 mb-6 flex flex-wrap items-center gap-3">
        <label class="text-sm text-slate-500">Filtrar por categoría:</label>
        <input type="text" name="categoria" th:value="${categoriaSeleccionada}" placeholder="Ej: Muebles"
               class="border border-slate-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        <button type="submit"
                class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-4 py-2 rounded-md transition">
            Filtrar
        </button>
        <a th:href="@{/productos}"
           class="border border-indigo-600 text-indigo-600 hover:bg-indigo-50 text-sm px-4 py-2 rounded-md transition">
            Quitar filtro
        </a>
    </form>

    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-slate-800 text-white uppercase text-xs tracking-wide">
            <tr>
                <th class="px-4 py-3 text-left">ID</th>
                <th class="px-4 py-3 text-left">Nombre</th>
                <th class="px-4 py-3 text-left">Categoría</th>
                <th class="px-4 py-3 text-left">Precio</th>
                <th class="px-4 py-3 text-left">Detalle</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="producto : ${productos}" class="odd:bg-white even:bg-slate-50 hover:bg-indigo-50 transition">
                <td class="px-4 py-3" th:text="${producto.id}"></td>
                <td class="px-4 py-3 font-medium" th:text="${producto.nombre}"></td>
                <td class="px-4 py-3">
                    <span class="bg-cyan-100 text-cyan-700 text-xs font-semibold px-3 py-1 rounded-full"
                          th:text="${producto.categoria}"></span>
                </td>
                <td class="px-4 py-3 font-semibold text-emerald-600" th:text="'$' + ${producto.precio}"></td>
                <td class="px-4 py-3">
                    <a th:href="@{/productos/{id}(id=${producto.id})}"
                       class="border border-indigo-600 text-indigo-600 hover:bg-indigo-50 text-xs px-3 py-1.5 rounded-md transition">
                        Ver detalle
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <p th:if="${#lists.isEmpty(productos)}"
       class="bg-amber-100 text-amber-700 px-4 py-3 rounded-lg mt-4 text-sm">
        No hay productos para esa categoría.
    </p>

    <div class="mt-6">
        <a th:href="@{/productos/nuevo}"
           class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-5 py-2.5 rounded-md transition">
            + Agregar nuevo producto
        </a>
    </div>
</div>
</body>
</html>
