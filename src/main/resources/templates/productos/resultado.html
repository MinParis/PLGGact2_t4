<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Producto guardado</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex justify-center items-start pt-16 px-4">

<div class="bg-white rounded-2xl shadow-md p-8 max-w-md w-full text-center">
    <div class="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-2xl mx-auto mb-4">
        ✓
    </div>
    <h1 class="text-lg font-bold mb-6">Producto guardado correctamente</h1>

    <div class="text-left">
        <div class="flex justify-between py-3 border-b border-slate-100">
            <span class="text-xs uppercase tracking-wide text-slate-400">Nombre</span>
            <span class="font-semibold" th:text="${productoDTO.nombre}"></span>
        </div>
        <div class="flex justify-between py-3 border-b border-slate-100">
            <span class="text-xs uppercase tracking-wide text-slate-400">Categoría</span>
            <span class="font-semibold" th:text="${productoDTO.categoria}"></span>
        </div>
        <div class="flex justify-between py-3">
            <span class="text-xs uppercase tracking-wide text-slate-400">Precio</span>
            <span class="font-semibold text-emerald-600" th:text="'$' + ${productoDTO.precio}"></span>
        </div>
    </div>

    <div class="flex justify-center gap-3 mt-6">
        <a th:href="@{/productos}"
           class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-4 py-2 rounded-md transition">
            Ver lista
        </a>
        <a th:href="@{/productos/nuevo}"
           class="border border-indigo-600 text-indigo-600 hover:bg-indigo-50 text-sm px-4 py-2 rounded-md transition">
            Agregar otro
        </a>
    </div>
</div>
</body>
</html>
